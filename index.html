<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Kajal ❤️</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: linear-gradient(to right, #ff758c, #ff7eb3);
    font-family: Arial;
    text-align: center;
    overflow: hidden;
    color: white;
}

h1 {
    margin-top: 40px;
    font-size: 40px;
}

#text {
    font-size: 20px;
    margin: 20px;
    min-height: 50px;
}

#slideshow img {
    width: 260px;
    height: 260px;
    border-radius: 20px;
    margin-top: 20px;
}

button {
    padding: 12px 20px;
    margin: 10px;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
}

#yes {
    background: white;
    color: hotpink;
}

#no {
    background: black;
    color: white;
}

.heart {
    position: absolute;
    color: red;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% {transform: translateY(100vh);}
    100% {transform: translateY(-10vh);}
}
</style>
</head>

<body>

<h1>❤️ Kajal ❤️</h1>
<div id="text"></div>

<div id="slideshow">
    <img id="slide" src="" />
</div>

<br>

<button id="yes" onclick="yesClick()">YES 💍</button>
<button id="no" onmouseover="moveNo()">NO 😜</button>

<audio id="music" loop>
<source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>
// Typing effect (fixed)
const msg = "Kajal... 💖 Apki aankhon mein jo pyaar chhupa hai, wahi meri zindagi ka sabse khoobsurat raaz hai 💍";
let i = 0;

function typing() {
    if (i < msg.length) {
        document.getElementById("text").innerHTML += msg.charAt(i);
        i++;
        setTimeout(typing, 50);
    }
}
typing();

// Working romantic images
const images = [
    "https://images.unsplash.com/photo-1518199266791-5375a83190b7",
    "https://images.unsplash.com/photo-1529333166437-7750a6dd5a70",
    "https://images.unsplash.com/photo-1511988617509-a57c8a288659"
];

let index = 0;
document.getElementById("slide").src = images[0];

setInterval(() => {
    index = (index + 1) % images.length;
    document.getElementById("slide").src = images[index];
}, 2000);

// YES button
function yesClick() {
    document.getElementById("music").play();
    alert("Yayyyy ❤️ I Love You Kajal 💍😍");
}

// NO button bhagega 😄
function moveNo() {
    const btn = document.getElementById("no");
    btn.style.position = "absolute";
    btn.style.top = Math.random() * window.innerHeight + "px";
    btn.style.left = Math.random() * window.innerWidth + "px";
}

// Hearts
function createHeart() {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
}
setInterval(createHeart, 300);

</script>

</body>
</html>
